<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="no-referrer"/>
  <title>PhoenixxxTv Fancode Player</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.css"/>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
    }
    video { width: 100%; height: 100%; max-width: 100%; background: #000; }
    .plyr { height: 100%; }
    .error-message {
      color: #fff;
      text-align: center;
      margin-top: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1.1rem;
      padding: 0 20px;
    }
  </style>
</head>
<body>

  <video id="player" controls autoplay playsinline style="background:#000"></video>
  <div id="error" class="error-message" style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
  <script>
    const video = document.getElementById('player');
    const errorDiv = document.getElementById('error');
    const streamUrl = new URLSearchParams(window.location.search).get('stream');

    function fail(msg) {
      video.style.display = 'none';
      errorDiv.style.display = 'block';
      errorDiv.textContent = msg;
    }

    if (!streamUrl) {
      fail('No stream link provided.');
    } else if (window.Hls && Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR, function (event, data) {
        if (data && data.fatal) {
          fail('Could not load video. Please try again later.');
          hls.destroy();
        }
      });
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        window.player = new Plyr(video, {
          controls: ['play-large', 'play', 'mute', 'volume', 'settings', 'fullscreen'],
        });
        video.play();
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
      video.addEventListener('error', () => fail('Could not load video. Please try again later.'));
      video.addEventListener('loadedmetadata', () => video.play());
      window.player = new Plyr(video, { controls: ['play-large', 'play', 'mute', 'volume', 'settings', 'fullscreen'] });
    } else {
      fail('Your browser does not support HLS playback.');
    }
  </script>
</body>
</html>
