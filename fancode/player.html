<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@allinone_reborn</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
    }
    #banner-top, #banner-bottom {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      padding: 5px 0;
      width: 100%;
      min-height: 50px;
    }
    #player {
      flex: 1;
      width: 100%;
      max-width: 100%;
      background: black;
      border: none;
    }
    @media (max-width: 768px) {
      #player {
        height: 60vh;
      }
    }
    @media (min-width: 769px) {
      #player {
        height: 80vh;
      }
    }
  </style>

</head>
<body>

  <!-- 🎬 Player -->
  <iframe id="player" allow="autoplay; fullscreen" allowfullscreen></iframe>

  <script>
    // get original stream URL from query ?stream=
    const raw = new URLSearchParams(window.location.search).get("stream");

    // ✅ the worker returns a full standalone player page (hls.js based),
    // not a raw .m3u8 — so it must be iframed, not fed to a player as a media file
    const streamUrl = "https://my-hls-worker.lakshman-n-hlc0596.workers.dev/ios=" + encodeURIComponent(raw);

    if (raw) {
      document.getElementById('player').src = streamUrl;
    } else {
      document.body.innerHTML = '<p style="color:#fff;text-align:center;margin-top:40px;">No stream link provided.</p>';
    }
  </script>
</body>
</html>
